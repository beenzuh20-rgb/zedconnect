{% extends "base.html" %}
{% block title %}My Profile{% endblock %}

{% block content %}
<div class="profile-container">
    <h2>My Profile</h2>
    
    <div class="profile-card">
        <img src="{{ user.profile_picture_url or '/static/default_profile.png' }}" alt="Profile Picture" class="profile-pic-large">
        
        <form action="/users/profile/edit" method="post" class="profile-form">
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" value="{{ user.full_name or '' }}">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" min="18" max="100" value="{{ user.age or '' }}">
                </div>
                
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender">
                        <option value="">Select Gender</option>
                        <option value="male" {% if user.gender == 'male' %}selected{% endif %}>Male</option>
                        <option value="female" {% if user.gender == 'female' %}selected{% endif %}>Female</option>
                        <option value="other" {% if user.gender == 'other' %}selected{% endif %}>Other</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label for="location">Location (Province)</label>
                <select id="location" name="location">
                    <option value="">Select Province</option>
                    {% for province in zambia_provinces %}
                    <option value="{{ province }}" {% if user.location == province %}selected{% endif %}>{{ province }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" rows="4">{{ user.bio or '' }}</textarea>
            </div>
            
            <div class="form-group">
                <label for="profile_picture_url">Profile Picture URL</label>
                <input type="text" id="profile_picture_url" name="profile_picture_url" value="{{ user.profile_picture_url or '' }}" placeholder="https://example.com/image.jpg">
            </div>
            
            <button type="submit" class="btn btn-primary">Save Profile</button>
        </form>
    </div>
</div>
{% endblock %}
